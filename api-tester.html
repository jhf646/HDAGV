<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AGV调度系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f0f0;
      overflow: hidden;
      color: #333;
    }
    body {
      padding: 14px;
      font-size: 14px;
    }
    .view {
      width: 100%;
      height: 100%;
    }
    .hidden {
      display: none !important;
    }
    .page-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .list-container {
      height: 100%;
      overflow-y: auto;
      padding-right: 2px;
    }
    .interface-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 14px;
    }
    .interface-card {
      border: none;
      background: #fff;
      border-radius: 14px;
      min-height: 130px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      padding: 18px;
    }
    .card-icon {
      font-size: 52px;
      line-height: 1;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      line-height: 1.35;
    }
    .detail-wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .detail-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .back-btn {
      border: 1px solid #d9d9d9;
      background: #fff;
      color: #333;
      width: 68px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .detail-title {
      flex: 1;
      font-size: 18px;
      font-weight: 700;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .detail-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding-right: 2px;
    }
    .row {
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 4px;
      font-size: 14px;
    }
    input[type=text] {
      width: 100%;
      height: 38px;
      border: 1px solid #d9d9d9;
      background: #fff;
      color: #333;
      border-radius: 8px;
      font-size: 14px;
      padding: 0 10px;
    }
    .stats-btn {
      border: 1px solid #1565c0;
      background: #1565c0;
      color: #fff;
      height: 36px;
      padding: 0 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .json-input-wrapper {
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      max-height: 360px;
      overflow-y: auto;
    }
    .json-fields {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .json-field-row {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 14px;
    }
    .json-field-row label {
      min-width: 92px;
      margin: 0;
      font-weight: normal;
      word-break: break-all;
    }
    .json-field-row input,
    .json-field-row select {
      flex: 1;
      height: 34px;
      padding: 0 8px !important;
      margin: 0 !important;
      border-radius: 4px;
      border: 1px solid #c9c9c9;
      font-size: 14px;
    }
    .json-field-row button {
      width: 34px;
      height: 34px;
      padding: 0;
      margin: 0;
      font-size: 14px;
      flex: none;
      border-radius: 4px;
    }
    .array-field-container {
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 6px;
      margin: 4px 0;
      font-size: 12px;
    }
    .array-field-title {
      font-weight: bold;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .array-item {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 4px;
      margin: 4px 0;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .array-item input,
    .array-item select {
      flex: 1;
      height: 34px;
      padding: 0 8px !important;
      margin: 0 !important;
      font-size: 14px;
      border: 1px solid #c9c9c9;
      border-radius: 3px;
    }
    .array-item button {
      width: 28px;
      height: 28px;
      padding: 0 !important;
      margin: 0 !important;
      font-size: 12px;
      flex: none;
      border-radius: 3px;
    }
    .add-array-item {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }
    textarea {
      height: 80px;
      font-family: 'Courier New', monospace;
      resize: none;
      overflow-y: auto;
      display: none;
    }
    .button-group {
      display: flex;
      margin-bottom: 10px;
      gap: 6px;
    }
    .primary-btn,
    .secondary-btn,
    .danger-btn {
      height: 38px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      color: #fff;
      cursor: pointer;
      flex: 1;
    }
    .primary-btn {
      background: #177ddc;
    }
    .secondary-btn {
      background: #5a6a7a;
    }
    .danger-btn {
      background: #c0392b;
      flex: none;
      width: 34px;
    }
    .resp {
      white-space: pre-wrap;
      background: #fff;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      overflow-y: auto;
      min-height: 130px;
      max-height: 220px;
      margin-bottom: 8px;
    }
    .response-panel {
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .response-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
    }
    .task-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid #eee;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }
    @media (max-width: 520px) {
      .task-meta-grid {
        grid-template-columns: 1fr;
      }
    }
    .task-meta-item {
      border: 1px solid #e6eef8;
      border-radius: 10px;
      padding: 8px 10px;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 54px;
    }
    .task-meta-label {
      font-size: 11px;
      color: #6b7a90;
      line-height: 1;
    }
    .task-meta-value {
      font-size: 13px;
      font-weight: 700;
      color: #20324a;
      word-break: break-all;
    }
    .task-meta-value.ok {
      color: #237804;
    }
    .task-meta-value.err {
      color: #a8071a;
    }
    .meta-pill {
      display: inline-flex;
      align-items: center;
      height: 24px;
      border-radius: 999px;
      padding: 0 10px;
      font-size: 12px;
      border: 1px solid #d9d9d9;
      color: #333;
      background: #fff;
    }
    .meta-pill.ok {
      border-color: #b7eb8f;
      background: #f6ffed;
      color: #237804;
    }
    .meta-pill.err {
      border-color: #ffccc7;
      background: #fff1f0;
      color: #a8071a;
    }
    .copy-btn {
      margin-left: auto;
      height: 26px;
      border: 1px solid #d9d9d9;
      background: #fff;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .resp {
      margin-bottom: 0;
      border: none;
      border-radius: 0;
      max-height: 260px;
    }
  </style>
</head>
<body>
  <div id="listView" class="view">
    <div class="list-container">
      <h2 class="page-title">接口列表</h2>
      <div id="interfaceList" class="interface-list"></div>
    </div>
  </div>

  <div id="detailView" class="view hidden">
    <div class="detail-wrap">
      <div class="detail-header">
        <button id="backBtn" class="back-btn" type="button">返回</button>
        <button id="statsBtn" class="stats-btn" type="button">📊 统计</button>
        <button id="agvStatusBtn" class="stats-btn" type="button">🤖 AGV状态</button>
        <div id="detailTitle" class="detail-title">接口详情</div>
      </div>
      <div class="detail-body">
        <input id="ip" type="hidden" value="192.168.111.70:8182" />
        <div class="json-input-wrapper">
          <label style="margin-bottom: 6px;">任务详情</label>
          <div id="jsonFields" class="json-fields"></div>
          <textarea id="body" placeholder="{}">{}</textarea>
        </div>
        <div class="button-group">
          <button id="send" class="primary-btn" type="button">发送</button>
          <button id="pretty" class="secondary-btn" type="button">美化</button>
        </div>
        <label>返回：</label>
        <div class="response-panel">
          <div class="response-meta">
            <span id="respStatusPill" class="meta-pill">状态: 未请求</span>
            <span id="respTimePill" class="meta-pill">耗时: -- ms</span>
            <span id="logStatusPill" class="meta-pill">日志: 未记录</span>
            <button id="copyResp" class="copy-btn" type="button">复制返回</button>
          </div>
          <div class="task-meta-grid">
            <div class="task-meta-item">
              <span class="task-meta-label">任务调用结果</span>
              <span id="taskSuccessValue" class="task-meta-value">未执行</span>
            </div>
            <div class="task-meta-item">
              <span class="task-meta-label">调用AGV编号</span>
              <span id="taskAgvValue" class="task-meta-value">-</span>
            </div>
            <div class="task-meta-item">
              <span class="task-meta-label">AGV地图</span>
              <span id="taskMapValue" class="task-meta-value">-</span>
            </div>
            <div class="task-meta-item">
              <span class="task-meta-label">日志写入状态</span>
              <span id="taskLogValue" class="task-meta-value">未记录</span>
            </div>
            <div class="task-meta-item" style="grid-column: 1 / -1;">
              <span class="task-meta-label">接口调用时间</span>
              <span id="taskCallTimeValue" class="task-meta-value">-</span>
            </div>
          </div>
          <pre id="response" class="resp">——</pre>
        </div>
      </div>
    </div>
  </div>

  <script src="./position-code-config.js"></script>
  <script>
    const appConfig = window.AGV_APP_CONFIG || {};
    const addressConfig = {
      frontend: {},
      backend: {}
    };

    function normalizeBaseUrl(urlText) {
      const val = String(urlText || '').trim();
      if (!val) return '';
      if (/^https?:\/\//i.test(val)) return val.replace(/\/$/, '');
      return ('http://' + val).replace(/\/$/, '');
    }

    async function loadAddressConfig(){
      try {
        const url = './request-address-config.json?t=' + Date.now();
        const resp = await fetch(url, { cache: 'no-store' });
        if (!resp.ok) return;
        const cfg = await resp.json();
        if (cfg && typeof cfg === 'object') {
          addressConfig.frontend = cfg.frontend || {};
          addressConfig.backend = cfg.backend || {};
        }
      } catch (e) {
        // 配置文件不存在或无法访问时使用默认策略
      }
    }

    function getConfiguredBackendBaseUrl() {
      return normalizeBaseUrl(addressConfig?.backend?.baseUrl || '');
    }
    const endpoints = Array.isArray(appConfig.endpoints) ? appConfig.endpoints : [];
    const defaultTargetIp = String(appConfig.defaultTargetIp || '192.168.111.70:8182');
    const iconPool = ['📦', '🚚', '✅', '📭', '🧭', '⚙️', '📣', '🔔', '🏗️', '🔎', '🤖', '🚨', '🧱', '🪶', '🧷', '🧪', '📬', '⛔'];
    const fieldConfig = appConfig.fieldConfig || {};
    let currentEndpointIndex = -1;
    let hiddenFieldValues = {};

    const listView = document.getElementById('listView');
    const detailView = document.getElementById('detailView');
    const interfaceList = document.getElementById('interfaceList');
    const responseEl = document.getElementById('response');
    const respStatusPillEl = document.getElementById('respStatusPill');
    const respTimePillEl = document.getElementById('respTimePill');
    const logStatusPillEl = document.getElementById('logStatusPill');
    const taskSuccessValueEl = document.getElementById('taskSuccessValue');
    const taskAgvValueEl = document.getElementById('taskAgvValue');
    const taskMapValueEl = document.getElementById('taskMapValue');
    const taskLogValueEl = document.getElementById('taskLogValue');
    const taskCallTimeValueEl = document.getElementById('taskCallTimeValue');
    const LOG_QUEUE_KEY = 'agv_task_log_queue_v1';
    document.getElementById('ip').value = defaultTargetIp;

    function formatDateTime(ts) {
      const d = ts instanceof Date ? ts : new Date(ts);
      const pad = (n) => String(n).padStart(2, '0');
      return [
        d.getFullYear(), '-', pad(d.getMonth() + 1), '-', pad(d.getDate()),
        ' ', pad(d.getHours()), ':', pad(d.getMinutes()), ':', pad(d.getSeconds())
      ].join('');
    }

    function escapeHtml(text){
      const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    function getPositionCodeOptions(endpointId, arrayKey, fieldKey){
      const configured = fieldConfig?.[endpointId]?.[arrayKey]?.[fieldKey];
      if (Array.isArray(configured) && configured.length > 0) {
        return configured.map(item => ({
          label: String(item.label ?? item.value ?? ''),
          value: String(item.value ?? item.label ?? '')
        }));
      }

      const fallback = [];
      for (let i = 1; i <= 5; i++) {
        for (let j = 1; j <= 4; j++) {
          const code = String(i * 1000 + j);
          fallback.push({label: code, value: code});
        }
      }
      return fallback;
    }

    function getFieldRules(endpointId){
      return fieldConfig?.[endpointId] || {};
    }

    function getSelectFieldOptions(endpointId, fieldKey){
      const configured = getFieldRules(endpointId)?.selectFields?.[fieldKey];
      if (!Array.isArray(configured)) {
        return [];
      }
      return configured.map(item => ({
        label: String(item.label ?? item.value ?? ''),
        value: String(item.value ?? item.label ?? '')
      }));
    }

    function getFieldDisplayName(endpointId, fieldKey){
      return String(getFieldRules(endpointId)?.displayNames?.[fieldKey] || fieldKey);
    }

    function renderInterfaceList(){
      interfaceList.innerHTML = '';
      if (endpoints.length === 0) {
        const empty = document.createElement('div');
        empty.textContent = '未配置接口，请检查 position-code-config.js';
        empty.style.padding = '12px';
        empty.style.color = '#666';
        interfaceList.appendChild(empty);
        return;
      }
      endpoints.forEach((endpoint, index) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'interface-card';
        card.innerHTML = `
          <div class="card-icon">${iconPool[index % iconPool.length]}</div>
          <div class="card-title">${escapeHtml(endpoint.name)}</div>
        `;
        card.addEventListener('click', () => openEndpoint(index));
        interfaceList.appendChild(card);
      });
    }

    function openEndpoint(index){
      currentEndpointIndex = index;
      loadEndpoint(index);
      listView.classList.add('hidden');
      detailView.classList.remove('hidden');
    }

    function backToList(){
      detailView.classList.add('hidden');
      listView.classList.remove('hidden');
    }

    function loadEndpoint(index){
      const endpoint = endpoints[index];
      document.getElementById('detailTitle').textContent = endpoint.name;
      responseEl.textContent = '——';
      setResponseMeta('状态: 未请求', null, '日志: 未记录', 'idle');
      resetTaskExecutionMeta();
      try {
        const sampleData = JSON.parse(JSON.stringify(endpoint.sample || {}));
        if (Object.prototype.hasOwnProperty.call(sampleData, 'reqCode')) {
          sampleData.reqCode = String(Date.now());
        }
        document.getElementById('body').value = JSON.stringify(sampleData, null, 2);
        renderJsonFields(sampleData);
      } catch (err) {
        document.getElementById('body').value = '{}';
        renderJsonFields({});
      }
    }

    function renderJsonFields(data){
      const container = document.getElementById('jsonFields');
      container.innerHTML = '';
      hiddenFieldValues = {};

      if (typeof data !== 'object' || data === null) {
        data = {};
      }

      const endpointId = endpoints[currentEndpointIndex]?.id;
      const rules = getFieldRules(endpointId);
      const hiddenFields = Array.isArray(rules.hiddenFields) ? rules.hiddenFields : [];

      Object.keys(data).forEach(key => {
        const value = data[key];
        if (hiddenFields.includes(key)) {
          hiddenFieldValues[key] = value;
          return;
        }
        const selectOptions = getSelectFieldOptions(endpointId, key);
        if (selectOptions.length > 0) {
          renderSelectField(container, key, String(value), selectOptions);
          return;
        }
        if (key === 'positionCodePath' && Array.isArray(value)) {
          renderArrayField(container, key, value);
        } else if (Array.isArray(value) || typeof value === 'object') {
          renderSimpleField(container, key, JSON.stringify(value));
        } else {
          renderSimpleField(container, key, String(value));
        }
      });
    }

    function renderSimpleField(container, key, displayValue){
      const endpointId = endpoints[currentEndpointIndex]?.id;
      const labelName = getFieldDisplayName(endpointId, key);
      const row = document.createElement('div');
      row.className = 'json-field-row';
      row.innerHTML = `
        <label>${escapeHtml(labelName)}:</label>
        <input type="text" class="json-value" data-key="${key}" value="${escapeHtml(displayValue)}" />
      `;

      row.querySelector('.json-value').addEventListener('change', () => {
        updateJsonBody();
      });

      container.appendChild(row);
    }

    function renderSelectField(container, key, selectedValue, options){
      const endpointId = endpoints[currentEndpointIndex]?.id;
      const labelName = getFieldDisplayName(endpointId, key);
      const row = document.createElement('div');
      row.className = 'json-field-row';
      let html = `<label>${escapeHtml(labelName)}:</label><select class="json-value" data-key="${key}">`;
      options.forEach(option => {
        const selected = String(selectedValue) === String(option.value) ? 'selected' : '';
        html += `<option value="${escapeHtml(String(option.value))}" ${selected}>${escapeHtml(String(option.label))}</option>`;
      });
      html += `</select>`;
      row.innerHTML = html;

      row.querySelector('.json-value').addEventListener('change', () => {
        updateJsonBody();
      });

      container.appendChild(row);
    }

    function renderArrayField(container, key, value){
      const endpointId = endpoints[currentEndpointIndex]?.id;
      const labelName = key === 'positionCodePath' ? '站点集合' : getFieldDisplayName(endpointId, key);
      const wrapper = document.createElement('div');
      wrapper.className = 'array-field-container';
      wrapper.dataset.arrayKey = key;

      wrapper.innerHTML = `
        <div class="array-field-title">
          <span>${escapeHtml(labelName)}</span>
        </div>
        <div class="array-items-container"></div>
      `;

      const itemsContainer = wrapper.querySelector('.array-items-container');
      if (Array.isArray(value)) {
        value.forEach((item, idx) => {
          renderArrayItem(itemsContainer, key, idx, item);
        });
      }

      container.appendChild(wrapper);
    }

    function renderArrayItem(container, arrayKey, itemIdx, item){
      const itemDiv = document.createElement('div');
      itemDiv.className = 'array-item';
      itemDiv.dataset.arrayKey = arrayKey;
      itemDiv.dataset.itemIndex = itemIdx;
      const currentEndpointId = endpoints[currentEndpointIndex]?.id;
      const arrayRule = fieldConfig?.[currentEndpointId]?.[arrayKey] || {};
      const hiddenFields = Array.isArray(arrayRule.hiddenFields) ? arrayRule.hiddenFields : [];

      if (typeof item === 'object' && item !== null) {
        const keys = Object.keys(item);
        let htmlContent = '';
        keys.forEach(k => {
          if (hiddenFields.includes(k)) {
            return;
          }
          if (k === 'positionCode' && arrayKey === 'positionCodePath') {
            const options = getPositionCodeOptions(currentEndpointId, arrayKey, k);
            const currentValue = String(item[k] ?? '');
            htmlContent += `<select class="array-item-field" data-field="${k}">`;
            htmlContent += `<option value="">请选择位置</option>`;
            options.forEach(opt => {
              const selected = currentValue === String(opt.value) ? 'selected' : '';
              htmlContent += `<option value="${escapeHtml(String(opt.value))}" ${selected}>${escapeHtml(String(opt.label))}</option>`;
            });
            if (currentValue && !options.some(opt => String(opt.value) === currentValue)) {
              htmlContent += `<option value="${escapeHtml(currentValue)}" selected>${escapeHtml(currentValue)}</option>`;
            }
            htmlContent += '</select>';
          } else {
            htmlContent += `<input type="text" class="array-item-field" data-field="${k}" value="${escapeHtml(String(item[k]))}" placeholder="${k}" />`;
          }
        });
        itemDiv.innerHTML = htmlContent;

        itemDiv.querySelectorAll('.array-item-field').forEach(input => {
          input.addEventListener('change', () => {
            updateJsonBody();
          });
        });
      } else {
        itemDiv.innerHTML = `
          <input type="text" class="array-item-field" data-field="0" value="${escapeHtml(String(item))}" />
        `;
        itemDiv.querySelector('.array-item-field').addEventListener('change', () => {
          updateJsonBody();
        });
      }

      container.appendChild(itemDiv);
    }

    function updateJsonBody(){
      const obj = {};
      const endpointId = endpoints[currentEndpointIndex]?.id;

      document.querySelectorAll('.json-field-row .json-value').forEach(field => {
        const key = field.dataset.key;
        const value = field.value.trim();
        if (value === 'true' || value === 'false') {
          obj[key] = value === 'true';
        } else if (value.startsWith('[') || value.startsWith('{')) {
          try {
            obj[key] = JSON.parse(value);
          } catch (e) {
            obj[key] = value;
          }
        } else {
          obj[key] = value;
        }
      });

      document.querySelectorAll('.array-field-container').forEach(container => {
        const arrayKey = container.dataset.arrayKey;
        const arrayItems = [];
        const arrayRule = fieldConfig?.[endpointId]?.[arrayKey] || {};
        const defaultValues = arrayRule.defaultValues || {};

        container.querySelectorAll('.array-item').forEach(item => {
          const fields = item.querySelectorAll('.array-item-field');
          if (fields.length === 1 && fields[0].dataset.field === '0') {
            arrayItems.push(fields[0].value);
          } else {
            const itemObj = {};
            fields.forEach(field => {
              const fieldName = field.dataset.field;
              const fieldValue = field.value.trim();
              if (fieldValue === 'true' || fieldValue === 'false') {
                itemObj[fieldName] = fieldValue === 'true';
              } else if (fieldValue.startsWith('[') || fieldValue.startsWith('{')) {
                try {
                  itemObj[fieldName] = JSON.parse(fieldValue);
                } catch (e) {
                  itemObj[fieldName] = fieldValue;
                }
              } else {
                itemObj[fieldName] = fieldValue;
              }
            });
            Object.keys(defaultValues).forEach(key => {
              if (!Object.prototype.hasOwnProperty.call(itemObj, key)) {
                itemObj[key] = defaultValues[key];
              }
            });
            arrayItems.push(itemObj);
          }
        });

        obj[arrayKey] = arrayItems;
      });

      Object.keys(hiddenFieldValues).forEach(key => {
        obj[key] = hiddenFieldValues[key];
      });

      document.getElementById('body').value = JSON.stringify(obj, null, 2);
    }

    function setResponseMeta(statusText, costMs, logText, statusKind){
      respStatusPillEl.textContent = statusText || '状态: 未知';
      respTimePillEl.textContent = '耗时: ' + (typeof costMs === 'number' ? costMs + ' ms' : '-- ms');
      logStatusPillEl.textContent = logText || '日志: 未记录';

      respStatusPillEl.className = 'meta-pill';
      if (statusKind === 'ok') {
        respStatusPillEl.classList.add('ok');
      } else if (statusKind === 'err') {
        respStatusPillEl.classList.add('err');
      }

      logStatusPillEl.className = 'meta-pill';
      if (String(logText || '').includes('成功')) {
        logStatusPillEl.classList.add('ok');
      } else if (String(logText || '').includes('失败') || String(logText || '').includes('排队')) {
        logStatusPillEl.classList.add('err');
      }
    }

    function setTaskExecutionMeta({ successText, successKind, agvCode, mapText, logText, logKind, callTimeText }) {
      if (successText !== undefined) {
        taskSuccessValueEl.textContent = successText || '-';
        taskSuccessValueEl.className = 'task-meta-value';
        if (successKind === 'ok') {
          taskSuccessValueEl.classList.add('ok');
        } else if (successKind === 'err') {
          taskSuccessValueEl.classList.add('err');
        }
      }

      if (agvCode !== undefined) {
        taskAgvValueEl.textContent = agvCode || '-';
      }

      if (mapText !== undefined) {
        taskMapValueEl.textContent = mapText || '-';
      }

      if (logText !== undefined) {
        taskLogValueEl.textContent = logText || '未记录';
        taskLogValueEl.className = 'task-meta-value';
        if (logKind === 'ok') {
          taskLogValueEl.classList.add('ok');
        } else if (logKind === 'err') {
          taskLogValueEl.classList.add('err');
        }
      }

      if (callTimeText !== undefined) {
        taskCallTimeValueEl.textContent = callTimeText || '-';
      }
    }

    function resetTaskExecutionMeta() {
      setTaskExecutionMeta({
        successText: '未执行',
        successKind: '',
        agvCode: '-',
        mapText: '-',
        logText: '未记录',
        logKind: '',
        callTimeText: '-',
      });
    }

    function formatResponseText(statusLine, text, endpointId, payload){
      let parsed = null;
      try {
        parsed = JSON.parse(text);
      } catch (e) {
        parsed = null;
      }

      let summary = '';
      if (endpointId === 'genAgvSchedulingTask') {
        const positionCount = Array.isArray(payload?.positionCodePath) ? payload.positionCodePath.length : 0;
        summary = [
          '[任务摘要]',
          'reqCode: ' + String(payload?.reqCode || '-'),
          'taskTyp: ' + String(payload?.taskTyp || '-'),
          'positionCodePath 数量: ' + String(positionCount),
          ''
        ].join('\n');
      }

      if (parsed !== null) {
        return summary + statusLine + '\n' + JSON.stringify(parsed, null, 2);
      }
      return summary + statusLine + '\n' + text;
    }

    function getPositionMapByCode(code) {
      const options = fieldConfig?.genAgvSchedulingTask?.positionCodePath?.positionCode;
      if (!Array.isArray(options)) return '';
      const matched = options.find(item => String(item?.value || '') === String(code || ''));
      return String(matched?.map || '').trim();
    }

    function resolveTaskMapShortName(payload) {
      const points = Array.isArray(payload?.positionCodePath) ? payload.positionCodePath : [];
      for (const point of points) {
        const code = String(point?.positionCode || '').trim();
        if (!code) continue;
        const map = getPositionMapByCode(code);
        if (map) return map;
      }
      const fromPayload = String(payload?.mapShortName || '').trim();
      return fromPayload || 'AA';
    }

    async function fetchAgvStatusByMap(targetBase, mapShortName) {
      const normalizedTargetBase = normalizeBaseUrl(targetBase);
      if (!normalizedTargetBase) {
        throw new Error('目标地址为空');
      }
      const targetUrl = normalizedTargetBase + '/rcms-dps/rest/queryAgvStatus';

      const proxyCandidates = [];
      const configuredBackendBase = getConfiguredBackendBaseUrl();
      if (configuredBackendBase) {
        proxyCandidates.push(configuredBackendBase + '/proxy');
      }
      if (/^https?:$/i.test(window.location.protocol)) {
        proxyCandidates.push(window.location.origin.replace(/\/$/, '') + '/proxy');
      }
      proxyCandidates.push('http://localhost:3000/proxy');
      proxyCandidates.push('http://127.0.0.1:3000/proxy');

      const unique = Array.from(new Set(proxyCandidates.filter(Boolean)));
      const body = {
        reqCode: String(Date.now()),
        reqTime: '',
        clientCode: '',
        tokenCode: '',
        mapShortName: mapShortName,
        robotCount: '-1'
      };

      let lastError = '';
      for (const proxyUrl of unique) {
        try {
          const resp = await fetch(proxyUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              url: targetUrl,
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body
            })
          });
          const text = await resp.text();
          if (!resp.ok) {
            lastError = 'proxy ' + proxyUrl + ' HTTP ' + resp.status + ' ' + String(text || '').slice(0, 120);
            continue;
          }
          const parsed = JSON.parse(text);
          const rows = Array.isArray(parsed?.data) ? parsed.data : [];
          return { rows, via: proxyUrl };
        } catch (e) {
          lastError = 'proxy ' + proxyUrl + ' ' + String(e && e.message ? e.message : e);
        }
      }
      throw new Error(lastError || 'AGV状态查询失败');
    }

    function pickAgvFromStatusRows(rows) {
      const list = Array.isArray(rows) ? rows : [];
      const candidates = list.filter(item => String(item?.status || '').trim() === '246');
      if (candidates.length === 0) return null;

      candidates.sort((a, b) => {
        const ba = Number(a?.battery || 0);
        const bb = Number(b?.battery || 0);
        if (bb !== ba) return bb - ba;
        return String(a?.robotCode || '').localeCompare(String(b?.robotCode || ''));
      });
      return candidates[0];
    }

    function getLocalLogQueue(){
      try {
        const raw = localStorage.getItem(LOG_QUEUE_KEY);
        const list = raw ? JSON.parse(raw) : [];
        return Array.isArray(list) ? list : [];
      } catch (e) {
        return [];
      }
    }

    function setLocalLogQueue(list){
      try {
        localStorage.setItem(LOG_QUEUE_KEY, JSON.stringify(Array.isArray(list) ? list : []));
      } catch (e) {
        // localStorage 不可用时忽略
      }
    }

    function pushLogToLocalQueue(logData){
      const queue = getLocalLogQueue();
      queue.push({
        ...logData,
        queuedAt: new Date().toISOString()
      });
      while (queue.length > 200) {
        queue.shift();
      }
      setLocalLogQueue(queue);
      return queue.length;
    }

    function normalizeApiHost(hostText){
      return normalizeBaseUrl(hostText);
    }

    function getLogApiCandidates(){
      const candidates = [];
      const hasHttpPage = /^https?:/i.test(window.location.protocol);
      const qsApiHost = new URLSearchParams(window.location.search).get('apiHost');
      const normalizedFromQuery = normalizeApiHost(qsApiHost);
      const configuredBackendBase = getConfiguredBackendBaseUrl();
      const baseCandidates = [];

      if (configuredBackendBase) {
        baseCandidates.push(configuredBackendBase);
      }
      if (hasHttpPage) {
        baseCandidates.push(window.location.origin.replace(/\/$/, ''));
      }
      if (normalizedFromQuery) {
        baseCandidates.push(normalizedFromQuery);
      }
      if (hasHttpPage && window.location.hostname) {
        const byHost3000 = window.location.protocol + '//' + window.location.hostname + ':3000';
        baseCandidates.push(byHost3000);
      }
      baseCandidates.push('http://localhost:3000');
      baseCandidates.push('http://127.0.0.1:3000');

      const uniqueBases = [];
      const usedBases = new Set();
      baseCandidates.forEach(base => {
        const normalized = String(base || '').replace(/\/$/, '');
        if (normalized && !usedBases.has(normalized)) {
          usedBases.add(normalized);
          uniqueBases.push(normalized);
        }
      });

      uniqueBases.forEach(base => {
        candidates.push({ type: 'direct', url: base + '/api/task-log' });
      });

      if (hasHttpPage) {
        const proxyUrl = window.location.origin.replace(/\/$/, '') + '/proxy';
        uniqueBases.forEach(base => {
          candidates.push({ type: 'proxy', url: proxyUrl, targetUrl: base + '/api/task-log' });
        });
      }

      const unique = [];
      const used = new Set();
      candidates.forEach(item => {
        const key = item.type + '::' + item.url + '::' + String(item.targetUrl || '');
        if (!used.has(key)) {
          used.add(key);
          unique.push(item);
        }
      });
      return unique;
    }

    async function sendLogToCandidate(candidate, logData) {
      if (candidate.type === 'proxy') {
        const resp = await fetch(candidate.url, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            url: candidate.targetUrl || 'http://localhost:3000/api/task-log',
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: logData
          })
        });
        if (!resp.ok) {
          const text = await resp.text().catch(() => '');
          throw new Error('proxy ' + resp.status + ' ' + String(text || '').slice(0, 120));
        }
        return true;
      }

      const resp = await fetch(candidate.url, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(logData)
      });
      if (!resp.ok) {
        const text = await resp.text().catch(() => '');
        throw new Error('direct ' + resp.status + ' ' + String(text || '').slice(0, 120));
      }
      return true;
    }

    async function postTaskLog(logData) {
      const apiCandidates = getLogApiCandidates();
      let lastErr = '';
      for (const candidate of apiCandidates) {
        try {
          const ok = await sendLogToCandidate(candidate, logData);
          if (ok) return { ok: true, via: candidate.type + ':' + candidate.url };
        } catch (e) {
          const reason = String(e && e.message ? e.message : e);
          const targetSuffix = candidate.targetUrl ? (' -> ' + candidate.targetUrl) : '';
          lastErr = candidate.type + ':' + candidate.url + targetSuffix + ' | ' + reason;
        }
      }
      const queueLen = pushLogToLocalQueue(logData);
      return {
        ok: false,
        queued: true,
        queueLen,
        error: lastErr || 'all candidates failed'
      };
    }

    async function flushQueuedTaskLogs(){
      const queue = getLocalLogQueue();
      if (queue.length === 0) return { flushed: 0, left: 0 };

      const apiCandidates = getLogApiCandidates();
      const rest = [];
      let flushed = 0;
      for (const item of queue) {
        let ok = false;
        for (const candidate of apiCandidates) {
          try {
            ok = await sendLogToCandidate(candidate, item);
            if (ok) break;
          } catch (e) {
            // 尝试下一个地址
          }
        }
        if (ok) {
          flushed += 1;
        } else {
          rest.push(item);
        }
      }
      setLocalLogQueue(rest);
      return { flushed, left: rest.length };
    }

    document.getElementById('backBtn').addEventListener('click', backToList);

    document.getElementById('statsBtn').addEventListener('click', () => {
      const base = getConfiguredBackendBaseUrl() || window.location.origin || 'http://localhost:3000';
      window.open('task-stats.html?apiHost=' + encodeURIComponent(base), '_blank');
    });

    document.getElementById('agvStatusBtn').addEventListener('click', () => {
      const base = getConfiguredBackendBaseUrl() || window.location.origin || 'http://localhost:3000';
      const targetIp = document.getElementById('ip').value || defaultTargetIp || '';
      window.open(
        'agv-status.html?apiHost=' + encodeURIComponent(base) + '&targetIp=' + encodeURIComponent(targetIp),
        '_blank',
      );
    });

    document.getElementById('pretty').addEventListener('click', () => {
      try {
        const j = JSON.parse(document.getElementById('body').value);
        document.getElementById('body').value = JSON.stringify(j, null, 2);
      } catch (e) {
        alert('JSON 格式错误');
      }
    });

    document.getElementById('send').addEventListener('click', async () => {
      updateJsonBody();

      const ip = document.getElementById('ip').value.trim();
      if (!ip) {
        alert('请填写目标 IP:PORT');
        return;
      }
      if (currentEndpointIndex < 0) {
        alert('请先选择接口');
        return;
      }

      const endpoint = endpoints[currentEndpointIndex];
      updateJsonBody();
      const payload = JSON.parse(document.getElementById('body').value || '{}');
      const endpointRule = getFieldRules(endpoint.id);
      const shouldUseTimestampReqCode =
        Object.prototype.hasOwnProperty.call(payload, 'reqCode') ||
        Object.prototype.hasOwnProperty.call(endpoint.sample || {}, 'reqCode') ||
        (Array.isArray(endpointRule.hiddenFields) && endpointRule.hiddenFields.includes('reqCode'));
      if (shouldUseTimestampReqCode) {
        payload.reqCode = String(Date.now());
        hiddenFieldValues.reqCode = payload.reqCode;
      }

      let base = ip;
      if (!/^https?:\/\//i.test(base)) {
        base = 'http://' + base;
      }

      let selectedAgvInfo = null;
      const callAtText = formatDateTime(new Date());
      setTaskExecutionMeta({
        successText: endpoint.id === 'genAgvSchedulingTask' ? '准备中' : '非任务接口',
        successKind: '',
        callTimeText: callAtText,
        logText: endpoint.id === 'genAgvSchedulingTask' ? '待记录' : '不记录',
        logKind: '',
      });
      if (endpoint.id === 'genAgvSchedulingTask') {
        try {
          const mapShortName = resolveTaskMapShortName(payload);
          const queryResult = await fetchAgvStatusByMap(base, mapShortName);
          const selected = pickAgvFromStatusRows(queryResult.rows);
          if (!selected) {
            responseEl.textContent =
              '发送前检查失败: 当前地图 ' + mapShortName + ' 没有状态为 246 的可用AGV';
            setResponseMeta('状态: 未发送', null, '日志: 未记录', 'err');
            setTaskExecutionMeta({
              successText: '失败',
              successKind: 'err',
              mapText: mapShortName,
              logText: '未记录',
              logKind: 'err',
            });
            return;
          }

          payload.agvCode = String(selected.robotCode || '');
          selectedAgvInfo = {
            robotCode: String(selected.robotCode || ''),
            status: String(selected.status || ''),
            battery: String(selected.battery || ''),
            mapShortName,
            via: queryResult.via,
          };
          setTaskExecutionMeta({
            agvCode: selectedAgvInfo.robotCode,
            mapText: selectedAgvInfo.mapShortName,
          });
        } catch (err) {
          responseEl.textContent = '发送前检查失败: ' + String(err && err.message ? err.message : err);
          setResponseMeta('状态: 未发送', null, '日志: 未记录', 'err');
          setTaskExecutionMeta({
            successText: '失败',
            successKind: 'err',
            logText: '未记录',
            logKind: 'err',
          });
          return;
        }
      }

      const url = base + (endpoint.path.startsWith('/') ? endpoint.path : ('/' + endpoint.path));
      const headers = endpoint.headers || {'Content-Type':'application/json'};
      const bodyText = JSON.stringify(payload, null, 2);
      document.getElementById('body').value = bodyText;
      const options = {method: endpoint.method, headers: headers};
      if (endpoint.method === 'POST' || endpoint.method === 'PUT') {
        options.body = bodyText;
      }

      responseEl.textContent = '请求中: ' + url;
      if (selectedAgvInfo) {
        responseEl.textContent +=
          '\n[AGV分配] 地图=' + selectedAgvInfo.mapShortName +
          ' 选中AGV=' + selectedAgvInfo.robotCode +
          ' 状态=' + selectedAgvInfo.status +
          ' 电量=' + selectedAgvInfo.battery +
          ' 查询通道=' + selectedAgvInfo.via;
      }
      setResponseMeta('状态: 请求中', null, '日志: 待记录', 'idle');
      if (endpoint.id === 'genAgvSchedulingTask') {
        setTaskExecutionMeta({
          successText: '请求中',
          successKind: '',
          logText: '待记录',
          logKind: '',
        });
      }
      const requestStartedAt = Date.now();
      try {
        const res = await fetch(url, options);
        const text = await res.text();
        const elapsed = Date.now() - requestStartedAt;
        const statusLine = res.status + ' ' + res.statusText;
        responseEl.textContent = formatResponseText(statusLine, text, endpoint.id, payload);
        if (selectedAgvInfo) {
          responseEl.textContent +=
            '\n[AGV分配] 地图=' + selectedAgvInfo.mapShortName +
            ' 调用AGV=' + selectedAgvInfo.robotCode +
            ' 状态=' + selectedAgvInfo.status +
            ' 电量=' + selectedAgvInfo.battery;
        }
        setResponseMeta('状态: ' + statusLine, elapsed, '日志: 非任务接口', res.ok ? 'ok' : 'err');
        if (endpoint.id === 'genAgvSchedulingTask') {
          setTaskExecutionMeta({
            successText: res.ok ? '成功' : '失败',
            successKind: res.ok ? 'ok' : 'err',
          });
        }

        // 记录 genAgvSchedulingTask 到数据库
        if (endpoint.id === 'genAgvSchedulingTask') {
          const logged = await postTaskLog({
            reqCode:       payload.reqCode || '',
            taskTyp:       payload.taskTyp || '',
            positionCodes: payload.positionCodePath || [],
            rawBody:       bodyText,
            respStatus:    res.status,
            respBody:      text.slice(0, 500)
          }).catch(() => ({ ok: false, error: 'postTaskLog exception' }));

          if (logged.ok) {
            responseEl.textContent += '\n[日志] 已写入统计数据库';
            setResponseMeta('状态: ' + statusLine, elapsed, '日志: 写入成功', res.ok ? 'ok' : 'err');
            setTaskExecutionMeta({ logText: '写入成功', logKind: 'ok' });
            flushQueuedTaskLogs();
          } else if (logged.queued) {
            responseEl.textContent += '\n[日志] 在线写入失败，已进入本地排队（待自动补写），队列: ' + logged.queueLen;
            setResponseMeta('状态: ' + statusLine, elapsed, '日志: 排队补写中', res.ok ? 'ok' : 'err');
            setTaskExecutionMeta({ logText: '排队补写中', logKind: 'err' });
          } else {
            responseEl.textContent += '\n[日志] 写入失败: ' + String(logged.error || 'unknown');
            setResponseMeta('状态: ' + statusLine, elapsed, '日志: 写入失败', res.ok ? 'ok' : 'err');
            setTaskExecutionMeta({ logText: '写入失败', logKind: 'err' });
          }
        }
      } catch (err) {
        const elapsed = Date.now() - requestStartedAt;
        responseEl.textContent = '请求失败: ' + err;
        if (selectedAgvInfo) {
          responseEl.textContent +=
            '\n[AGV分配] 地图=' + selectedAgvInfo.mapShortName +
            ' 调用AGV=' + selectedAgvInfo.robotCode +
            ' 状态=' + selectedAgvInfo.status +
            ' 电量=' + selectedAgvInfo.battery;
        }
        setResponseMeta('状态: 请求失败', elapsed, '日志: 未记录', 'err');
        if (endpoint.id === 'genAgvSchedulingTask') {
          setTaskExecutionMeta({
            successText: '失败',
            successKind: 'err',
            logText: '未记录',
            logKind: 'err',
          });
        }

        if (endpoint.id === 'genAgvSchedulingTask') {
          const logged = await postTaskLog({
            reqCode:       payload.reqCode || '',
            taskTyp:       payload.taskTyp || '',
            positionCodes: payload.positionCodePath || [],
            rawBody:       bodyText,
            respStatus:    0,
            respBody:      String(err).slice(0, 500)
          }).catch(() => ({ ok: false, error: 'postTaskLog exception' }));

          if (logged.ok) {
            responseEl.textContent += '\n[日志] 失败请求已写入统计数据库';
            setResponseMeta('状态: 请求失败', elapsed, '日志: 写入成功', 'err');
            setTaskExecutionMeta({ logText: '写入成功', logKind: 'ok' });
            flushQueuedTaskLogs();
          } else if (logged.queued) {
            responseEl.textContent += '\n[日志] 失败请求已排队，待补写，队列: ' + logged.queueLen;
            setResponseMeta('状态: 请求失败', elapsed, '日志: 排队补写中', 'err');
            setTaskExecutionMeta({ logText: '排队补写中', logKind: 'err' });
          } else {
            responseEl.textContent += '\n[日志] 写入失败: ' + String(logged.error || 'unknown');
            setResponseMeta('状态: 请求失败', elapsed, '日志: 写入失败', 'err');
            setTaskExecutionMeta({ logText: '写入失败', logKind: 'err' });
          }
        }
      }
    });

    document.getElementById('copyResp').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(responseEl.textContent || '');
        const old = document.getElementById('copyResp').textContent;
        document.getElementById('copyResp').textContent = '已复制';
        setTimeout(() => {
          document.getElementById('copyResp').textContent = old;
        }, 1000);
      } catch (e) {
        alert('复制失败，请手动复制');
      }
    });

    (async () => {
      await loadAddressConfig();
      flushQueuedTaskLogs().catch(() => {
        // 页面初始化时静默尝试
      });
      renderInterfaceList();
    })();
  </script>
